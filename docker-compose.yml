
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: acquisition
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - POSTGRES_SERVER=db
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      - ./api-gateway/app:/app/app
      - ./shared_lib:/shared_lib

  identity-service:
    build:
      context: .
      dockerfile: identity-service/Dockerfile
    environment:
      - POSTGRES_SERVER=db
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - ./identity-service/app:/app/app
      - ./shared_lib:/shared_lib

  marketing-service:
    build:
      context: .
      dockerfile: marketing-service/Dockerfile
    environment:
      - POSTGRES_SERVER=db
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - ./marketing-service/app:/app/app
      - ./shared_lib:/shared_lib

  intelligence-service:
    build:
      context: .
      dockerfile: intelligence-service/Dockerfile
    environment:
      - POSTGRES_SERVER=db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - ./intelligence-service/app:/app/app
      - ./shared_lib:/shared_lib

  comms-service:
    build:
      context: .
      dockerfile: comms-service/Dockerfile
    environment:
      - POSTGRES_SERVER=db
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - ./comms-service/app:/app/app
      - ./shared_lib:/shared_lib

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    command: ["celery", "-A", "app.core.celery_app", "worker", "--loglevel=info"]
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      - ./worker/app:/app/app
      - ./shared_lib:/shared_lib

  scheduler-service:
    build:
      context: .
      dockerfile: scheduler-service/Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_SERVER=db
    depends_on:
      - redis
      - db
    env_file:
      - .env
    volumes:
      - ./scheduler-service/app:/app/app
      - ./shared_lib:/shared_lib

  scheduler-beat:
    build:
      context: .
      dockerfile: scheduler-service/Dockerfile
    command: ["celery", "-A", "app.core.celery_app", "beat", "--loglevel=info"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_SERVER=db
    depends_on:
      - redis
      - db

  ops-service:
    build:
      context: .
      dockerfile: ops-service/Dockerfile
    environment:
      - POSTGRES_SERVER=db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - ./ops-service/app:/app/app
      - ./shared_lib:/shared_lib

  inbound-service:
    build:
      context: .
      dockerfile: inbound-service/Dockerfile
    environment:
      - POSTGRES_SERVER=db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - ./inbound-service/app:/app/app
      - ./shared_lib:/shared_lib

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - api-gateway
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    env_file:
      - .env
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway

volumes:
  postgres_data:
