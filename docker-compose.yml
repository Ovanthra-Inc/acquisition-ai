version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: acquisition
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - POSTGRES_SERVER=db
    depends_on:
      - redis
    volumes:
      - ./api-gateway/app:/app/app
      - ./shared_lib:/shared_lib

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    environment:
      - POSTGRES_SERVER=db
    depends_on:
      - db
    volumes:
      - ./auth-service/app:/app/app
      - ./shared_lib:/shared_lib

  lead-service:
